<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-title" content="HyPurShot">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0D0D0D">
<title>Digital Card — HyPurShot</title>
<link rel="icon" type="image/png" href="/logo-nav.webp">
<meta name="robots" content="noindex">
<meta name="description" content="A HyPurShot operator shared their digital card with you.">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="HyPurShot">
<meta property="og:title" id="og-title" content="Digital Card — HyPurShot">
<meta property="og:description" id="og-desc" content="A HyPurShot operator shared their digital card with you. Tap to save it or see their work.">
<meta property="og:image" content="https://hypurshot.com/og-default.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="/app.js"></script>

<style>
  :root {
    --bg: #0D0D0D;
    --surface: #161616;
    --surface-2: #1F1F1F;
    --gold: #D4A017;
    --gold-hover: #E5B22C;
    --ice: #A8D4E6;
    --text: #F0EDE8;
    --muted: #b8b3aa;
    --rule: rgba(240,237,232,0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Satoshi', system-ui, -apple-system, Segoe UI, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .card-shell {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 120px;
  }

  /* Business header — Blinq-style hero band + offset headshot */
  .biz-header {
    padding: 0;
    margin-bottom: 60px; /* room for the offset headshot */
    position: relative;
  }
  .biz-hero {
    background: #F0EDE8;
    border-radius: 20px;
    padding: 32px 24px;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px;
    position: relative;
    /* No overflow:hidden — the offset headshot needs to hang below */
  }
  .biz-logo-large {
    max-width: 82%;
    max-height: 156px;
    width: auto; height: auto;
    object-fit: contain;
  }
  .biz-logo-initials {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 72px;
    letter-spacing: -0.03em;
    color: #0D0D0D;
  }
  .biz-headshot {
    position: absolute;
    left: 20px;
    bottom: -46px;
    width: 92px; height: 92px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 2px var(--gold);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 30px;
    letter-spacing: -0.02em;
  }
  .biz-headshot img { width: 100%; height: 100%; object-fit: cover; }
  .biz-identity {
    padding: 8px 4px 0;
    text-align: left;
  }
  .biz-name {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  .biz-owner-line {
    font-size: 15px;
    color: var(--text);
    margin-top: 8px;
    font-weight: 500;
  }
  .biz-owner-title {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }
  .biz-tag {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Primary CTAs */
  .primary-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 24px 0 20px;
  }
  .btn-primary, .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 20px;
    border-radius: 12px;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .btn-primary {
    background: var(--gold);
    color: #1a1000;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: transparent;
    color: var(--ice);
    border: 1px solid rgba(168,212,230,0.35);
  }
  .btn-secondary:active { transform: scale(0.98); }
  .btn-primary svg, .btn-secondary svg { width: 18px; height: 18px; }

  /* Owner strip */
  .owner-strip {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 14px;
    margin-bottom: 8px;
  }
  .owner-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border: 2px solid var(--gold);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 20px;
    overflow: hidden;
  }
  .owner-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .owner-meta { flex: 1; min-width: 0; }
  .owner-eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .owner-name {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .owner-title {
    font-size: 13px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* Contact list */
  .contact-list {
    background: var(--surface);
    border-radius: 14px;
    padding: 4px 16px;
    margin-top: 10px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:active { opacity: 0.7; }
  .contact-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid rgba(212, 160, 23, 0.35);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    flex-shrink: 0;
  }
  .contact-icon svg { width: 18px; height: 18px; }
  .contact-meta { flex: 1; min-width: 0; }
  .contact-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contact-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* Loading / error states */
  .state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .state h1 {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    color: var(--text);
    font-size: 22px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .state p { font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
  .state a {
    display: inline-block;
    background: var(--gold);
    color: #1a1000;
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-family: 'Cabinet Grotesk', sans-serif;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-size: 13px;
  }

  /* Footer strip */
  .card-footer {
    text-align: center;
    padding: 24px 20px 20px;
    color: var(--muted);
    font-size: 12px;
  }
  .card-footer a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }

  /* Hide the whole card until loaded */
  .card-content { display: none; }
  .card-content.loaded { display: block; }

  /* Floating Share button (top-right on the card page) */
  .share-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: #1a1000;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,160,23,0.4);
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .share-btn:hover { background: var(--gold-hover); }
  .share-btn:active { transform: scale(0.96); }
  .share-btn svg { width: 14px; height: 14px; }

  /* Share sheet backdrop */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

  /* Share sheet */
  .share-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    z-index: 100;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  }
  .share-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 12px auto 6px;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 20px;
  }
  .sheet-title {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .sheet-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sheet-close:hover { color: var(--text); }
  .sheet-close svg { width: 16px; height: 16px; }

  /* QR block */
  .qr-plate {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  .qr-plate svg, .qr-plate img {
    width: 100%;
    max-width: 260px;
    height: auto;
    display: block;
  }
  .qr-caption {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .qr-caption strong {
    display: block;
    color: var(--gold);
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
    margin-top: 4px;
    word-break: break-all;
  }

  /* Share action rows */
  .share-actions { display: flex; flex-direction: column; gap: 8px; }
  .share-action {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    background: var(--surface-2);
    border-radius: 14px;
    border: 1px solid var(--rule);
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    font-family: 'Satoshi', sans-serif;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease, transform 0.08s ease;
  }
  .share-action:hover { background: #262626; }
  .share-action:active { transform: scale(0.985); }
  .share-action.primary {
    background: rgba(168, 212, 230, 0.08);
    border-color: rgba(168, 212, 230, 0.35);
  }
  .share-action.primary:hover { background: rgba(168, 212, 230, 0.14); }
  .share-action.primary .action-icon { color: var(--ice); border-color: rgba(168,212,230,0.4); }
  .action-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid rgba(212,160,23,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    flex-shrink: 0;
  }
  .action-icon svg { width: 17px; height: 17px; }
  .action-label { flex: 1; }
  .action-caret {
    color: var(--muted);
    flex-shrink: 0;
  }
  .action-caret svg { width: 14px; height: 14px; }

  /* Copy link feedback */
  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gold);
    color: #1a1000;
    padding: 12px 24px;
    border-radius: 999px;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Give the shell room so the Share pill never overlaps the logo */
  .card-shell { padding-top: 68px; }

  @media (prefers-reduced-motion: reduce) {
    .share-sheet, .sheet-backdrop, .copy-toast, .share-btn { transition: none; }
  }
</style>
</head>
<body>

<!-- Loading state (default) -->
<div class="state" id="loading-state">
  <p>Loading card…</p>
</div>

<!-- Error state -->
<div class="state" id="error-state" style="display:none;">
  <h1>Card not found</h1>
  <p>This card doesn't exist or has been made private.</p>
  <a href="/">Go to HyPurShot</a>
</div>

<!-- Floating Share button (visible only when card loaded) -->
<button class="share-btn" id="share-btn" type="button" aria-label="Share this card" style="display:none;">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7M16 6l-4-4-4 4M12 2v13"/></svg>
  Share
</button>

<!-- Share sheet -->
<div class="sheet-backdrop" id="sheet-backdrop" aria-hidden="true"></div>
<div class="share-sheet" id="share-sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title" aria-hidden="true">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Share your card</div>
    <button class="sheet-close" id="sheet-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="qr-plate" id="qr-plate"></div>
  <div class="qr-caption">
    Point a camera at the code
    <strong id="qr-url">hypurshot.com/card/…</strong>
  </div>

  <div class="share-actions">
    <button class="share-action primary" id="share-save-contact" type="button">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      </div>
      <div class="action-label">Save to Contacts</div>
      <div class="action-caret">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </button>

    <button class="share-action" id="share-copy-link" type="button">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </div>
      <div class="action-label">Copy link</div>
    </button>

    <a class="share-action" id="share-sms" href="#">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="action-label">Text this card</div>
    </a>

    <a class="share-action" id="share-email" href="#">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      </div>
      <div class="action-label">Email this card</div>
    </a>

    <button class="share-action" id="share-more" type="button" style="display:none;">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      </div>
      <div class="action-label">More · WhatsApp, Messages, AirDrop</div>
    </button>
  </div>
</div>

<div class="copy-toast" id="copy-toast">Link copied</div>

<!-- The card -->
<div class="card-content" id="card-content">
  <div class="card-shell">

    <div class="biz-header">
      <div class="biz-hero" id="biz-hero">
        <span class="biz-logo-initials" id="biz-logo-fallback"></span>
        <div class="biz-headshot" id="biz-headshot"></div>
      </div>
    </div>

    <div class="biz-identity">
      <div class="biz-name" id="biz-name"></div>
      <div class="biz-owner-line" id="biz-owner-line" style="display:none"></div>
      <div class="biz-owner-title" id="biz-owner-title" style="display:none"></div>
      <div class="biz-tag" id="biz-tag"></div>
    </div>

    <div class="primary-actions">
      <button class="btn-primary" id="save-contact-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        Save to Contacts
      </button>
      <a class="btn-secondary" id="portfolio-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
        See My Work
      </a>
    </div>

    <div class="contact-list" id="contact-list"></div>

    <div class="card-footer">
      Powered by <a href="/" target="_blank" rel="noopener">HyPurShot</a>
    </div>

  </div>
</div>

<script>
(function() {
  'use strict';

  // Icons
  const ICONS = {
    email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
    phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L7.9 9.7a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"/></svg>',
    web: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-6 4 2 8-6-4-6 4 2-8-6-4h7z"/></svg>',
    instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>',
    tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 8.4a5.9 5.9 0 0 1-3.4-1.1v7a5 5 0 1 1-5-5c.3 0 .6 0 .9.1v2.6a2.4 2.4 0 1 0 1.6 2.3V3h2.5a3.4 3.4 0 0 0 3.4 3.4z"/></svg>',
    facebook: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 22v-8h3l.5-4H13V7.5c0-1.1.3-1.9 2-1.9h2V2.1a29 29 0 0 0-3-.2c-3 0-5 1.8-5 5.1V10H6v4h3v8z"/></svg>',
  };

  // Route: read the slug from either /card.html?slug=... or /card/{slug}
  const params = new URLSearchParams(window.location.search);
  let slug = params.get('slug') || '';
  if (!slug) {
    const m = window.location.pathname.match(/^\/card\/([A-Za-z0-9_-]{2,120})\/?$/);
    if (m) slug = m[1];
  }
  slug = (slug || '').trim().toLowerCase();

  const $loading = document.getElementById('loading-state');
  const $error = document.getElementById('error-state');
  const $content = document.getElementById('card-content');

  function showError() {
    $loading.style.display = 'none';
    $error.style.display = 'block';
    $content.classList.remove('loaded');
  }

  function e(id) { return document.getElementById(id); }

  function initials(name) {
    if (!name) return 'HS';
    const parts = String(name).trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return 'HS';
    if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function safeUrl(u) {
    if (!u) return '';
    const s = String(u).trim();
    if (!s) return '';
    if (/^https?:\/\//i.test(s)) return s;
    return 'https://' + s;
  }

  function displayUrl(u) {
    return String(u || '').replace(/^https?:\/\/(www\.)?/i, '').replace(/\/$/, '');
  }

  function contactRow(icon, value, label, href) {
    const row = document.createElement(href ? 'a' : 'div');
    row.className = 'contact-row';
    if (href) { row.href = href; if (/^https?:\/\//i.test(href)) row.target = '_blank'; row.rel = 'noopener noreferrer'; }
    row.innerHTML =
      '<div class="contact-icon">' + icon + '</div>' +
      '<div class="contact-meta">' +
        '<div class="contact-value"></div>' +
        '<div class="contact-label"></div>' +
      '</div>';
    row.querySelector('.contact-value').textContent = value;
    row.querySelector('.contact-label').textContent = label;
    return row;
  }

  function vcardEscape(v) {
    return String(v || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
  }

  function buildVCard(biz) {
    const lines = ['BEGIN:VCARD', 'VERSION:3.0'];
    const firstName = biz.first_name || '';
    const lastName = biz.last_name || '';
    const fullName = (firstName + ' ' + lastName).trim() || biz.name;
    // N (last;first;middle;prefix;suffix), FN (full name)
    lines.push('N:' + vcardEscape(lastName) + ';' + vcardEscape(firstName) + ';;;');
    lines.push('FN:' + vcardEscape(fullName));
    if (biz.name) lines.push('ORG:' + vcardEscape(biz.name));
    if (biz.owner_title) lines.push('TITLE:' + vcardEscape(biz.owner_title));
    if (biz.owner_email) lines.push('EMAIL;TYPE=WORK:' + vcardEscape(biz.owner_email));
    if (biz.owner_mobile) lines.push('TEL;TYPE=CELL:' + vcardEscape(biz.owner_mobile));
    // Only add business line if it's a different number than owner_mobile.
    const vcLastTen = s => String(s || '').replace(/\D/g, '').slice(-10);
    if (biz.phone && vcLastTen(biz.phone) && vcLastTen(biz.phone) !== vcLastTen(biz.owner_mobile)) {
      lines.push('TEL;TYPE=WORK:' + vcardEscape(biz.phone));
    }
    if (biz.sales_phone) lines.push('TEL;TYPE=WORK,VOICE:' + vcardEscape(biz.sales_phone));
    if (biz.website) lines.push('URL:' + vcardEscape(safeUrl(biz.website)));
    if (biz.booking_url) lines.push('URL;TYPE=BOOKING:' + vcardEscape(safeUrl(biz.booking_url)));
    if (biz.city || biz.state) {
      lines.push('ADR;TYPE=WORK:;;;' + vcardEscape(biz.city || '') + ';' + vcardEscape(biz.state || '') + ';;');
    }
    if (biz.instagram_url) lines.push('X-SOCIALPROFILE;TYPE=instagram:' + vcardEscape(safeUrl(biz.instagram_url)));
    if (biz.tiktok_url) lines.push('X-SOCIALPROFILE;TYPE=tiktok:' + vcardEscape(safeUrl(biz.tiktok_url)));
    if (biz.facebook_url) lines.push('X-SOCIALPROFILE;TYPE=facebook:' + vcardEscape(safeUrl(biz.facebook_url)));
    // Note URL back to the card so recipient always has a live link
    lines.push('NOTE:' + vcardEscape('HyPurShot card: https://hypurshot.com/card/' + (biz.showcase_slug || '')));
    lines.push('END:VCARD');
    return lines.join('\r\n');
  }

  function downloadVCard(biz) {
    const vcard = buildVCard(biz);
    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const safeName = (biz.first_name && biz.last_name)
      ? (biz.first_name + '-' + biz.last_name)
      : (biz.name || 'contact');
    const filename = safeName.replace(/[^A-Za-z0-9-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') + '.vcf';
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
  }

  async function loadCard() {
    if (!slug) { showError(); return; }
    if (!window.HPS || !window.HPS.sb) { showError(); return; }

    const { data, error } = await window.HPS.sb
      .from('businesses')
      .select('id, name, phone, logo_url, showcase_slug, first_name, last_name, business_type, city, state, website, gbp_review_link, google_rating_avg, google_rating_count, visibility, owner_title, owner_headshot_url, owner_email, owner_mobile, sales_phone, booking_url, instagram_url, tiktok_url, facebook_url')
      .ilike('showcase_slug', slug)
      .limit(1)
      .maybeSingle();

    if (error || !data) { showError(); return; }
    if (data.visibility === 'private') { showError(); return; }

    render(data);
  }

  function render(biz) {
    // Hero band — big logo on a light chip
    const hero = e('biz-hero');
    const fallbackSpan = e('biz-logo-fallback');
    if (biz.logo_url) {
      // Remove initials fallback, insert full-size logo before the headshot node
      if (fallbackSpan) fallbackSpan.remove();
      // Only insert once even if render() gets called again
      const existing = hero.querySelector('img.biz-logo-large');
      if (existing) existing.remove();
      const img = document.createElement('img');
      img.className = 'biz-logo-large';
      img.src = biz.logo_url;
      img.alt = biz.name || 'Logo';
      const headshot = e('biz-headshot');
      hero.insertBefore(img, headshot);
    } else if (fallbackSpan) {
      fallbackSpan.textContent = initials(biz.name);
    }

    // Business name
    e('biz-name').textContent = biz.name || 'HyPurShot Business';

    // Owner offset headshot inside the hero band
    const fullName = ((biz.first_name || '') + ' ' + (biz.last_name || '')).trim();
    const headshotEl = e('biz-headshot');
    if (biz.owner_headshot_url) {
      headshotEl.innerHTML = '';
      const img = document.createElement('img');
      img.src = biz.owner_headshot_url;
      img.alt = fullName || biz.name || 'Owner';
      headshotEl.appendChild(img);
    } else {
      headshotEl.textContent = initials(fullName || biz.name);
    }

    // Owner name + title (left-aligned under the business name)
    const ownerLineEl = e('biz-owner-line');
    const ownerTitleEl = e('biz-owner-title');
    if (fullName) {
      ownerLineEl.textContent = fullName;
      ownerLineEl.style.display = '';
    }
    if (biz.owner_title) {
      ownerTitleEl.textContent = biz.owner_title;
      ownerTitleEl.style.display = '';
    }

    // Business type + city tag
    const tagParts = [];
    if (biz.business_type) tagParts.push(String(biz.business_type).replace(/_/g, ' '));
    if (biz.city && biz.state) tagParts.push(biz.city + ', ' + biz.state);
    else if (biz.city) tagParts.push(biz.city);
    e('biz-tag').textContent = tagParts.join(' · ').toUpperCase();

    // Page title
    const pageTitle = (fullName ? (fullName + ' — ') : '') + (biz.name || 'HyPurShot Card');
    document.title = pageTitle + ' — HyPurShot';
    const og = document.getElementById('og-title'); if (og) og.setAttribute('content', pageTitle);

    // Portfolio link (goes to existing /p/{share_token} route via showcase page)
    const portfolioHref = biz.showcase_slug ? ('/showcase.html?slug=' + encodeURIComponent(biz.showcase_slug)) : '#';
    e('portfolio-link').href = portfolioHref;

    // Contact list — only render rows that have data
    const list = e('contact-list');
    list.innerHTML = '';

    if (biz.owner_email) {
      list.appendChild(contactRow(ICONS.email, biz.owner_email, 'Email', 'mailto:' + biz.owner_email));
    }
    if (biz.owner_mobile) {
      list.appendChild(contactRow(ICONS.phone, biz.owner_mobile, 'Mobile', 'tel:' + biz.owner_mobile.replace(/[^\d+]/g, '')));
    }
    // Show business line only if it's a different number than the owner mobile.
    // Compare last 10 digits to normalize away country code and formatting.
    const lastTen = s => {
      const d = String(s || '').replace(/\D/g, '');
      return d.slice(-10);
    };
    if (biz.phone && lastTen(biz.phone) && lastTen(biz.phone) !== lastTen(biz.owner_mobile)) {
      list.appendChild(contactRow(ICONS.phone, biz.phone, 'Business line', 'tel:' + biz.phone.replace(/[^\d+]/g, '')));
    }
    if (biz.sales_phone) {
      list.appendChild(contactRow(ICONS.phone, biz.sales_phone, 'Sales line', 'tel:' + biz.sales_phone.replace(/[^\d+]/g, '')));
    }
    if (biz.website) {
      list.appendChild(contactRow(ICONS.web, displayUrl(biz.website), 'Website', safeUrl(biz.website)));
    }
    if (biz.booking_url) {
      list.appendChild(contactRow(ICONS.calendar, 'Book an appointment', 'Booking site', safeUrl(biz.booking_url)));
    }
    if (biz.gbp_review_link) {
      const stars = (biz.google_rating_avg && biz.google_rating_count)
        ? (Number(biz.google_rating_avg).toFixed(1) + ' \u2605 \u00b7 ' + biz.google_rating_count + ' reviews')
        : 'Leave a review';
      list.appendChild(contactRow(ICONS.star, stars, 'Google Business', safeUrl(biz.gbp_review_link)));
    }
    if (biz.instagram_url) {
      list.appendChild(contactRow(ICONS.instagram, displayUrl(biz.instagram_url).replace(/^instagram\.com\//i, '@'), 'Instagram', safeUrl(biz.instagram_url)));
    }
    if (biz.tiktok_url) {
      list.appendChild(contactRow(ICONS.tiktok, displayUrl(biz.tiktok_url).replace(/^tiktok\.com\//i, ''), 'TikTok', safeUrl(biz.tiktok_url)));
    }
    if (biz.facebook_url) {
      list.appendChild(contactRow(ICONS.facebook, displayUrl(biz.facebook_url).replace(/^facebook\.com\//i, ''), 'Facebook', safeUrl(biz.facebook_url)));
    }

    // If the contact list ended up empty, hide the container
    if (!list.children.length) list.style.display = 'none';

    // Wire the Save to Contacts button
    document.getElementById('save-contact-btn').addEventListener('click', function() {
      downloadVCard(biz);
    });

    // Wire the share sheet
    initShareSheet(biz);

    // Reveal
    $loading.style.display = 'none';
    $content.classList.add('loaded');
    document.getElementById('share-btn').style.display = 'flex';
  }

  // ============================================================
  // Share sheet
  // ============================================================

  function initShareSheet(biz) {
    const cardUrl = 'https://hypurshot.com/card/' + encodeURIComponent(biz.showcase_slug || '');
    const displayUrlText = 'hypurshot.com/card/' + (biz.showcase_slug || '');
    const bizName = biz.name || 'HyPurShot business';
    const ownerFirst = biz.first_name || '';
    const ownerFull = ((biz.first_name || '') + ' ' + (biz.last_name || '')).trim();

    // Fill the QR caption
    document.getElementById('qr-url').textContent = displayUrlText;

    // Generate the QR code as SVG (crisp at any size, small payload)
    renderQR('qr-plate', cardUrl);

    // Prebuild share copy for text / email
    const shortMsg = ownerFull
      ? (ownerFirst + " from " + bizName + " — here's my card: " + cardUrl)
      : (bizName + " — here's my card: " + cardUrl);
    const emailSubject = ownerFull
      ? (ownerFull + ' · ' + bizName + ' — digital card')
      : (bizName + ' — digital card');
    const emailBody = (ownerFirst
      ? ("Hey,\n\n" + ownerFirst + " from " + bizName + " here. Here's my digital card — tap the link to save my contact:\n\n")
      : ("Hey,\n\nHere's my digital card from " + bizName + ". Tap the link to save my contact:\n\n"))
      + cardUrl
      + "\n\nThanks,\n" + (ownerFull || bizName);

    // sms:?&body= works on iOS 8+ and modern Android; the & separator handles both.
    document.getElementById('share-sms').href = 'sms:?&body=' + encodeURIComponent(shortMsg);
    document.getElementById('share-email').href = 'mailto:?subject=' + encodeURIComponent(emailSubject) + '&body=' + encodeURIComponent(emailBody);

    // Show More button only if the browser has native share
    const hasNativeShare = typeof navigator !== 'undefined' && typeof navigator.share === 'function';
    if (hasNativeShare) {
      const moreBtn = document.getElementById('share-more');
      moreBtn.style.display = 'flex';
      moreBtn.addEventListener('click', function() {
        navigator.share({
          title: emailSubject,
          text: shortMsg,
          url: cardUrl,
        }).catch(function() { /* user dismissed — no-op */ });
      });
    }

    // Open / close wiring
    const btn = document.getElementById('share-btn');
    const backdrop = document.getElementById('sheet-backdrop');
    const sheet = document.getElementById('share-sheet');
    const closeBtn = document.getElementById('sheet-close');

    function open() {
      backdrop.classList.add('open');
      sheet.classList.add('open');
      sheet.setAttribute('aria-hidden', 'false');
      backdrop.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      backdrop.classList.remove('open');
      sheet.classList.remove('open');
      sheet.setAttribute('aria-hidden', 'true');
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    btn.addEventListener('click', open);
    backdrop.addEventListener('click', close);
    closeBtn.addEventListener('click', close);
    document.addEventListener('keydown', function(ev) {
      if (ev.key === 'Escape' && sheet.classList.contains('open')) close();
    });

    // Save-to-contacts from inside the sheet
    document.getElementById('share-save-contact').addEventListener('click', function() {
      downloadVCard(biz);
      close();
    });

    // Copy link
    document.getElementById('share-copy-link').addEventListener('click', function() {
      copyToClipboard(cardUrl);
    });

    // On mobile, close the sheet after the user taps sms/email (they leave to native app)
    document.getElementById('share-sms').addEventListener('click', function() { setTimeout(close, 300); });
    document.getElementById('share-email').addEventListener('click', function() { setTimeout(close, 300); });
  }

  function renderQR(mountId, text) {
    const mount = document.getElementById(mountId);
    if (!mount) return;
    mount.innerHTML = '';

    // qrcode-generator: type 0 = auto version, M = ~15% error correction
    // Increase until content fits; caps at 40.
    try {
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      // createSvgTag(cellSize, margin) — use 6px cells / 0 margin (the plate gives padding)
      const svgString = qr.createSvgTag({ cellSize: 6, margin: 0, scalable: true });
      // Ensure it renders responsively — replace fixed width/height with viewBox-only
      const wrapper = document.createElement('div');
      wrapper.innerHTML = svgString;
      const svg = wrapper.querySelector('svg');
      if (svg) {
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.style.width = '100%';
        svg.style.height = 'auto';
        svg.style.display = 'block';
        // The library emits a full-size <rect> as the background and a <path>
        // holding all the black modules. Background must be white; only path stays black.
        const bgRect = svg.querySelector('rect');
        if (bgRect) bgRect.setAttribute('fill', '#ffffff');
        const modulePath = svg.querySelector('path');
        if (modulePath) modulePath.setAttribute('fill', '#000000');
        mount.appendChild(svg);
      } else {
        mount.innerHTML = svgString;
      }
    } catch (err) {
      // Fallback: fetch a PNG from a public QR renderer if the library failed to load
      const img = document.createElement('img');
      img.alt = 'QR code';
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=520x520&margin=0&data=' + encodeURIComponent(text);
      mount.appendChild(img);
    }
  }

  function copyToClipboard(text) {
    const toast = document.getElementById('copy-toast');
    const showToast = function(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 1800);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function() { showToast('Link copied'); },
        function() { fallbackCopy(text, showToast); }
      );
    } else {
      fallbackCopy(text, showToast);
    }
  }

  function fallbackCopy(text, showToast) {
    // Legacy clipboard fallback for older iOS Safari and non-secure contexts
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-1000px';
      ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(ok ? 'Link copied' : 'Copy failed — tap and hold');
    } catch (err) {
      showToast('Copy failed — tap and hold');
    }
  }

  // Wait for HPS to be ready
  function boot() {
    if (window.HPS && window.HPS.sb) {
      loadCard();
    } else {
      setTimeout(boot, 50);
    }
  }
  boot();
})();
</script>
