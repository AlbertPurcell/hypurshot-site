<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-title" content="HyPurShot">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Reset Password — HyPurShot</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#0D0D0D">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0D0D;
    --surface: #161616;
    --border: rgba(255,255,255,0.08);
    --gold: #D4A017;
    --gold-hover: #c2920f;
    --ice: #A8D4E6;
    --text: #f0ede8;
    --text-muted: #888680;
    --error: #e05c6c;
    --success: #5db875;
    --font-heading: 'Cabinet Grotesk', sans-serif;
    --font-body: 'Satoshi', sans-serif;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 32px;
  }

  .logo {
    display: block;
    margin: 0 auto 24px;
    height: 56px;
    width: auto;
  }

  h1 {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .field input {
    width: 100%;
    height: 48px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    transition: border-color 0.15s ease;
  }

  .field input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .field .hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .btn {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    margin-top: 8px;
  }

  .btn-gold {
    background: var(--gold);
    color: #000;
  }

  .btn-gold:hover { background: var(--gold-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }

  .footer a:hover { text-decoration: underline; }

  .status {
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.45;
    margin-bottom: 16px;
    display: none;
  }

  .status.show { display: block; }
  .status.error { background: rgba(224,92,108,0.1); border: 1px solid rgba(224,92,108,0.3); color: var(--error); }
  .status.success { background: rgba(93,184,117,0.1); border: 1px solid rgba(93,184,117,0.3); color: var(--success); }
  .status.info { background: rgba(168,212,230,0.08); border: 1px solid rgba(168,212,230,0.25); color: var(--ice); }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn.loading .spinner { display: inline-block; }
  .btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  #success-view { display: none; text-align: center; }
  #success-view .check {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(93,184,117,0.15);
    border: 1px solid rgba(93,184,117,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: var(--success);
  }
</style>
</head>
<body>

<div class="card">
  <img src="logo-full.webp" alt="HyPurShot" class="logo">

  <!-- FORM VIEW -->
  <div id="form-view">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password for your HyPurShot account.</p>

    <div id="status" class="status"></div>

    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
      <div class="hint">Use at least 8 characters with a mix of letters and numbers.</div>
    </div>

    <div class="field">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password">
    </div>

    <button class="btn btn-gold" id="submit-btn" onclick="updatePassword()">
      <span class="btn-text">Update password</span>
      <span class="spinner"></span>
    </button>

    <div class="footer">
      <a onclick="window.location.href='auth.html'">Back to sign in</a>
    </div>
  </div>

  <!-- SUCCESS VIEW -->
  <div id="success-view">
    <div class="check">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Password updated</h1>
    <p class="subtitle">You can now sign in with your new password.</p>
    <button class="btn btn-gold" onclick="window.location.href='auth.html'">
      <span class="btn-text">Go to sign in</span>
    </button>
  </div>
</div>

<script>
const supabaseUrl = 'https://xjsicupdpzawxlwcvxzv.supabase.co';
const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhqc2ljdXBkcHphd3hsd2N2eHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjgxNjEsImV4cCI6MjA5MDMwNDE2MX0.ZIuEFOCz1T7aVv6a39hXzvUucSZKgTJhDW5iPyXh1KM';

const _supabase = supabase.createClient(supabaseUrl, supabaseAnonKey, {
  auth: { detectSessionInUrl: true, flowType: 'implicit' }
});

const statusEl = document.getElementById('status');
const formView = document.getElementById('form-view');
const successView = document.getElementById('success-view');
const submitBtn = document.getElementById('submit-btn');

let hasRecoverySession = false;

function showStatus(message, kind) {
  statusEl.textContent = message;
  statusEl.className = 'status show ' + kind;
}

function clearStatus() {
  statusEl.className = 'status';
  statusEl.textContent = '';
}

function setLoading(loading) {
  if (loading) submitBtn.classList.add('loading');
  else submitBtn.classList.remove('loading');
  submitBtn.disabled = loading;
}

// Listen for the recovery event Supabase fires once it parses the URL hash
_supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
    hasRecoverySession = true;
    clearStatus();
  }
});

// Boot: confirm we have a usable session, otherwise show error
(async function init() {
  // Give Supabase a tick to parse the URL fragment
  await new Promise(r => setTimeout(r, 250));

  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    hasRecoverySession = true;
    return;
  }

  // No session and no hash — link was bad or expired
  if (!window.location.hash.includes('access_token') && !window.location.hash.includes('error')) {
    showStatus('This page can only be opened from a password reset email. Request a new link from the sign-in page.', 'info');
    submitBtn.disabled = true;
    return;
  }

  if (window.location.hash.includes('error')) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const desc = params.get('error_description') || 'The reset link is invalid or has expired.';
    showStatus(decodeURIComponent(desc.replace(/\+/g, ' ')) + ' Request a new link from the sign-in page.', 'error');
    submitBtn.disabled = true;
  }
})();

async function updatePassword() {
  clearStatus();
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (pw.length < 8) {
    showStatus('Password must be at least 8 characters.', 'error');
    return;
  }
  if (pw !== confirm) {
    showStatus('Passwords do not match.', 'error');
    return;
  }

  if (!hasRecoverySession) {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) {
      showStatus('Your reset link has expired. Request a new one from the sign-in page.', 'error');
      return;
    }
  }

  setLoading(true);
  try {
    const { error } = await _supabase.auth.updateUser({ password: pw });
    if (error) {
      showStatus(error.message, 'error');
      setLoading(false);
      return;
    }
    // Sign out so they re-authenticate cleanly with the new password
    await _supabase.auth.signOut();
    formView.style.display = 'none';
    successView.style.display = 'block';
  } catch (e) {
    showStatus('Something went wrong. Please try again.', 'error');
    setLoading(false);
  }
}

// Submit on Enter
document.getElementById('confirm').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') updatePassword();
});

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
